name: Upload Config to Website

on:
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/upload-config.yml"
      - "config/src/main/kotlin/io/github/autotweaker/config/serializer/**"
      - "core/src/main/kotlin/io/github/autotweaker/core/data/settings/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Serialize config
        run: ./gradlew :config:serializeConfig

      - name: Upload to website
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "${{ secrets.WEBSITE_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts

          # Clone website repo
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key"
          mkdir -p .temp
          git clone git@github.com:AutoTweaker/website.git .temp/website-repo
          cd .temp/website-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Update index.json version
          SETTINGS_VERSION=$(grep -oP 'const val SETTINGS_VERSION = "\K[^"]+' \
            "$GITHUB_WORKSPACE/core/src/main/kotlin/io/github/autotweaker/core/data/settings/SerializeConfig.kt")
          jq -c 'map(if .default_app_config != "" then .version = "'"$SETTINGS_VERSION"'" else . end)' index.json > index.json.tmp
          mv index.json.tmp index.json

          # Copy config
          mkdir -p default_config
          cp "$GITHUB_WORKSPACE/.temp/default_config/AppConfig.json" default_config/AppConfig.json

          # Commit and push
          git add default_config/AppConfig.json index.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update config from AutoTweaker/core"
            git push origin main
          fi
