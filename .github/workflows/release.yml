name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Extract version from tag
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"

      - name: Build and package
        run: ./gradlew :core:distZip :core:distTar

      - name: Install build dependencies
        run: sudo apt-get update -y && sudo apt-get install -y libcjson-dev

      - name: Build .deb package
        run: ./gradlew buildDeb

      - name: Publish api to GitHub Packages
        run: ./gradlew :api:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create "v$VERSION" \
            --title "AutoTweaker v$VERSION" \
            --generate-notes \
            core/build/distributions/*.zip \
            core/build/distributions/*.tar \
            .temp/deb/*.deb
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update index repository
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "${{ secrets.WEBSITE_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts

          # Construct clone URLs and deb URL
          HTTPS_URL="https://github.com/${{ github.repository }}.git"
          SSH_URL="git@github.com:${{ github.repository }}.git"
          FULL_VERSION=$(grep '^version=' build/generated/version/version.properties | cut -d= -f2)
          DEB_FILE=$(basename .temp/deb/*.deb)
          # GitHub replaces ~ with . in release download URLs
          DEB_FILE_FOR_URL=$(echo "$DEB_FILE" | tr '~' '.')
          DEB_URL="https://github.com/AutoTweaker/core/releases/download/v${VERSION}/${DEB_FILE_FOR_URL}"

          # Clone index repo
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key"
          git clone git@github.com:AutoTweaker/index.git /tmp/index-repo
          cd /tmp/index-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Overwrite index.json
          jq -n --arg https "$HTTPS_URL" --arg ssh "$SSH_URL" --arg v "$FULL_VERSION" --arg deb "$DEB_URL" \
            '{core: {clone_url: {https: $https, ssh: $ssh}, version: $v, deb_url: $deb}}' \
            > index.json

          # Commit and push
          git add index.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update core to v${VERSION}"
            git push origin main
          fi
