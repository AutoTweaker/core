name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Extract version from tag
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"

      - name: Build and package
        run: ./gradlew :core:distZip :core:distTar

      - name: Install build dependencies
        run: sudo apt-get update -y && sudo apt-get install -y libcjson-dev

      - name: Build .deb package
        run: ./gradlew buildDeb

      - name: Publish api to GitHub Packages
        run: ./gradlew :api:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create "v$VERSION" \
            --title "AutoTweaker v$VERSION" \
            --generate-notes \
            core/build/distributions/*.zip \
            core/build/distributions/*.tar \
            .temp/deb/*.deb
        env:
          GH_TOKEN: ${{ github.token }}

  update-index:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"

      - name: Install PyYAML
        run: pip3 install pyyaml

      - name: Update index repository
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "${{ secrets.WEBSITE_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts

          # Get version
          FULL_VERSION=$(grep '^version=' build/generated/version/version.properties | cut -d= -f2)

          # Clone index repo
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key"
          git clone git@github.com:AutoTweaker/index.git .temp/index
          cd .temp/index
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Merge index.yml with release assets
          gh release view "v${VERSION}" --json assets \
            | python3 ../../scripts/merge-index.py ../../index.yml index.json "$FULL_VERSION"

          # Commit and push
          git add index.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update core to v${VERSION}"
            git push origin main
          fi
        env:
          GH_TOKEN: ${{ github.token }}
