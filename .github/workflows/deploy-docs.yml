name: Deploy Docs

on:
  push:
    branches: [ main ]
    paths:
      - 'api/src/**'
      - 'api/build.gradle.kts'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Generate Dokka docs
        run: ./gradlew :api:dokkaGenerate

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PAGES_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts

      - name: Clone pages repository
        run: git clone git@github.com:autotweaker/autotweaker.github.io.git .temp/pages
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/deploy_key

      - name: Configure git
        working-directory: .temp/pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy docs
        working-directory: .temp/pages
        run: |
          rm -rf doc
          mkdir doc
          cp -r ../../api/build/dokka/api/* doc/

      - name: Push
        working-directory: .temp/pages
        run: |
          git add doc
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update API docs"
            git push origin main
          fi
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/deploy_key
