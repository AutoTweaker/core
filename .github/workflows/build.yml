name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew build

      - name: Package distributions
        run: |
          ./gradlew :core:distZip :core:distTar
          DEV_VER=$(grep -oP 'version=\K.*' core/build/generated/version/version.properties)
          cd core/build/distributions
          for ext in zip tar; do
            f=$(ls autotweaker-*.$ext 2>/dev/null | head -1)
            [ -n "$f" ] && mv "$f" "autotweaker-${DEV_VER}.$ext"
          done

      - name: Upload distZip (dev snapshot)
        uses: actions/upload-artifact@v5
        with:
          name: autotweaker-dev-dist
          path: |
            core/build/distributions/*.zip
            core/build/distributions/*.tar
          retention-days: 7
